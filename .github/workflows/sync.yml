name: 아임웹 입력폼 -> 구글시트 동기화

on:
  schedule:
    # 매시 5분, 24시간 상시 (정각은 GitHub Actions 스케줄러 부하로 지연/드롭되기 쉬워 5분으로 오프셋)
    - cron: "5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 동기화 실행
        env:
          IMWEB_ADMIN_ID: ${{ secrets.IMWEB_ADMIN_ID }}
          IMWEB_ADMIN_PW: ${{ secrets.IMWEB_ADMIN_PW }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/sync_form_to_sheet.py

      - name: 디버그 스크린샷 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            debug.png
            debug.html
          retention-days: 3
