name: 아임웹 입력폼 -> 구글시트 동기화

on:
  schedule:
    # 매시 정각, UTC 01:00~08:00 = KST 10:00~17:00 (운영 시간 중 1시간마다)
    - cron: "0 1-8 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 동기화 실행
        env:
          IMWEB_ADMIN_ID: ${{ secrets.IMWEB_ADMIN_ID }}
          IMWEB_ADMIN_PW: ${{ secrets.IMWEB_ADMIN_PW }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/diagnose_dupe.py

      - name: 디버그 스크린샷 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            debug.png
            debug.html
          retention-days: 3
